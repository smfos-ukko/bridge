<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Antin bridgepalikat</title>
    <link rel="stylesheet" href="stuff/bridge.css">
    <link rel="stylesheet" href="stuff/bidwriter/bidwriter.css">
    <link rel="stylesheet" href="stuff/systemsheet/systemsheet.css">
    <link rel="icon" href="stuff/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="banner">
        <h1>Antin Bridgepalikat</h1>
        <div class="flexing align-baseline">
            <h3 id="welcometext"></h3>
            <button id="backbutton" class="mainbutton">Etusivulle</button>
            <button id="authbutton" class="mainbutton altbutton">Kirjaudu</button>
        </div>
    </div>
    <div id="loginslide" class="slidedown">
        <div id="loginpanel">
            <div id="logincontainer">
                <div id="logininputcontainer">
                    <h3>Käyttäjätunnus</h3>
                    <input type="text" id="usernameinput">
                    <h3>Salasana</h3>
                    <input type="text" id="passwordinput">
                </div>
                <div id="loginbuttoncontainer">
                    <div>
                        <button id="signupbutton" class="mainbutton">Rekisteröidy</button>
                        <button id="loginbutton" class="mainbutton altbutton">Kirjaudu</button>
                    </div>
                    <span id="loginmessage"></span>
                </div>
            </div>
        </div>
        <div id="mainpage" class="subpage activated">
            <button class="mainbutton openPageButton" name="bidwriter">Tarjouspiirtäjä</button>
            <button class="mainbutton openPageButton" name="systemsheet">Systeemiprintteri</button>
        </div>
        <div id="toolContainer"></div>
    </div>
    <script type="module" src="stuff/bridge.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"
        integrity="sha512-BNaRQnYJYiPSqHHDb58B0yaPfCu+Wgds8Gp/gU33kqBtgNS4tSPHuGibyoeqMV/TJlSKda6FXzoEyYGjTe+vXA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</body>

</html>
