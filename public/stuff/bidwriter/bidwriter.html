<div id="bidwriter" class="subpage toolpage">
    <div class="flexing">
        <div id="bwselect">
            <h3>Jakaja</h3>
            <div class="flexing">
                <button class="bwdealer lit">W</button>
                <button class="bwdealer">N</button>
                <button class="bwdealer">E</button>
                <button class="bwdealer">S</button>
            </div>
            <h3>Vaarassa</h3>
            <div class="flexing">
                <button class="bwvul lit">Ei kukaan</button>
                <button class="bwvul">Kaikki</button>
                <button class="bwvul">NS</button>
                <button class="bwvul">EW</button>
            </div>
        </div>
        <div id="bwenter">
            <h3>Tarjoukset</h3>
            <table>
                <tbody id="bwtable">
                    <tr>
                        <th>W</th>
                        <th>N</th>
                        <th>E</th>
                        <th>S</th>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div id="bwtablebg" class="inline">
        <div id="bwtablecanvas">
            <div id="bwtableback">
                <table>
                    <thead>
                        <tr>
                            <th class="bwPanel nonvul">W</th>
                            <th class="bwPanel nonvul">N</th>
                            <th class="bwPanel nonvul">E</th>
                            <th class="bwPanel nonvul">S</th>
                        </tr>
                    </thead>
                    <tbody id="bwboard">
                    </tbody>
                </table>
            </div>
        </div>
        <div id="bwOptions">
            <div id="bwFinalButtons">
                <button id="bwSnap" class="mainbutton">Tallenna kuvana</button>
                <button id="bwReset" class="mainbutton">Tyhjennä</button>
            </div>
            <div id="bwText">
                <br />
                <p>Voit liikkua taulukossa nuolinäppäimillä, tyhjä tarjous = pass.</p>
                <p>Windowsissa Win + Shift + S avaa näyttötallennuksen.</p>
            </div>
        </div>
    </div>
</div>
