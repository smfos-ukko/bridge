<div id="systemsheet" class="subpage toolpage">
    <div id="sheetOptions">
        <div id="sheetManageSystems">
            <h3 id="sheetManageTitle">Kirjaudu sisään tallentaaksesi systeemejä.</h3>
        </div>
        <div id="sheetOptLeft">
            <div id="systemNameDiv">
                <h3>Systeemin nimi</h3>
                <input type="text" id="systemName">
            </div>
            <div id="sheetLB">
                <button id="saveSystemButton">Tallenna</button>
                <button id="emptySheetButton">Tyhjennä</button>
                <button id="deleteSheetButton">Poista</button>
            </div>
        </div>
    </div>
    <div id="sheetOperations">
        <div id="systemSheetInputs">
            <div class="flexing">
                <div>
                    <h3>Pelaaja 1</h3>
                    <input type="text" id="sheetp1" class="sheetUpperInputs">
                    <h3>Matenumero</h3>
                    <input type="text" id="sheetMateNumberp1" class="sheetUpperInputs">
                </div>
                <div>
                    <h3>Pelaaja 2</h3>
                    <input type="text" id="sheetp2" class="sheetUpperInputs">
                    <h3>Matenumero</h3>
                    <input type="text" id="sheetMateNumberp2" class="sheetUpperInputs">
                </div>
            </div>
            <h3>Perussysteemi</h3>
            <input type="text" id="sheetBaseSystem" class="sheetUpperInputs">
            <h3>Tarjoukset</h3>
            <div id="sheetBidInputs" class="sheetInputs"></div>
            <h3>Lähdöt</h3>
            <div class="sheetInputs">
                <textarea rows="4" cols="50" id="sheetLeadInput"></textarea>
            </div>
            <h3>Merkinannot</h3>
            <div class="sheetInputs">
                <textarea rows="4" cols="50" id="sheetSignalInput"></textarea>
            </div>
            <h3>Konventiot</h3>
            <div class="sheetInputs">
                <textarea rows="4" cols="50" id="sheetConventionInput"></textarea>
            </div>
        </div>
    </div>

    <div class="a4sheet">
        <div id="a5left" class="a5sized"></div>
        <div id="a5right" class="a5sized"></div>
    </div>
</div>
