<!doctype html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Antin bridgepalikat</title>
        <link rel="stylesheet" href="stuff/bridge.css">
        <link rel="icon" href="stuff/favicon.ico" type="image/x-icon">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="banner">
            <h1>Antin Bridgepalikat</h1>
            <button id="backbutton" class="mainbutton">Etusivulle</button>
        </div>
        <div id="mainpage" class="subpage activated">
            <button class="mainbutton" onclick="openPage('bidwriter')">Tarjouspiirtäjä</button>
        </div>
        <div id="bidwriter" class="subpage toolpage">
            <div class="inrow">
                <div id="bwselect">
                    <h3>Jakaja</h3>
                    <div class="inrow">
                        <button class="bwdealer lit">N</button>
                        <button class="bwdealer">E</button>
                        <button class="bwdealer">S</button>
                        <button class="bwdealer">W</button>
                    </div>
                    <h3>Vaarassa</h3>
                    <div class="inrow">
                        <button class="bwvul lit">Ei kukaan</button>
                        <button class="bwvul">Kaikki</button>
                        <button class="bwvul">NS</button>
                        <button class="bwvul">EW</button>
                    </div>
                </div>
                <div id="bwenter">
                    <h3>Tarjoukset</h3>
                    <table>
                        <tbody id="bwtable">
                            <tr>
                                <th>N</th>
                                <th>E</th>
                                <th>S</th>
                                <th>W</th>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div id="bwtablebg" class="inline">
                <div id="bwtableback">
                    <table>
                        <thead>
                            <tr>
                                <th class="bwPanel nonvul">N</th>
                                <th class="bwPanel nonvul">E</th>
                                <th class="bwPanel nonvul">S</th>
                                <th class="bwPanel nonvul">W</th>
                            </tr>
                        </thead>
                        <tbody id="bwboard">
                        </tbody>
                    </table>
                </div>
                <button id="bwSnap" class="mainbutton">Tallenna kuvana</button>
            </div>
        </div>
        <script src="stuff/bridge.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" integrity="sha512-BNaRQnYJYiPSqHHDb58B0yaPfCu+Wgds8Gp/gU33kqBtgNS4tSPHuGibyoeqMV/TJlSKda6FXzoEyYGjTe+vXA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    </body>
</html>
